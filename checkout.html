<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabulous - Finalizar Compra</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width='100' height='100' fill='%23ff6600' rx='20'/><text x='50' y='70' font-size='80' text-anchor='middle' fill='white' font-weight='bold'>F</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; }
        .input-dark { background: #18181b; border: 1px solid #4b5563; color: white; }
        .input-dark:focus { border-color: #fb923c; box-shadow: 0 0 0 3px rgba(251,146,60,0.2); }
    </style>
</head>
<body class="min-h-screen bg-black">

    <!-- Navbar (igual ao shop.html) -->
    <nav class="bg-zinc-950 border-b border-zinc-800 py-3 sticky top-0 z-50">
        <!-- Cole aqui o código completo da nav do shop.html se quiser exato igual -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 flex justify-between items-center">
            <a href="shop.html" class="text-orange-500 text-3xl font-black">Fabulous</a>
            <div class="flex gap-6">
                <a href="cart.html" class="hover:text-orange-400">Carrinho</a>
                <a href="shop.html" class="hover:text-orange-400">Continuar Comprando</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-12">
        <h1 class="text-4xl font-black text-orange-500 mb-10 text-center">Finalizar Compra</h1>

        <div class="grid md:grid-cols-5 gap-10">
            <!-- Formulário de Checkout -->
            <div class="md:col-span-3 space-y-10">
                <div class="bg-zinc-900 rounded-3xl p-8">
                    <h2 class="text-2xl font-bold mb-6">Endereço de Entrega</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="Nome completo">
                        <input type="email" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="E-mail">
                        <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl md:col-span-2" placeholder="Endereço completo">
                        <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="Cidade">
                        <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="Estado">
                        <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="CEP">
                    </div>
                </div>

                <div class="bg-zinc-900 rounded-3xl p-8">
                    <h2 class="text-2xl font-bold mb-6">Pagamento</h2>
                    <div class="space-y-6">
                        <div class="flex gap-6 mb-6">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="payment" class="accent-orange-500" checked>
                                <span>Cartão de Crédito</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="payment" class="accent-orange-500">
                                <span>Pix (mais rápido)</span>
                            </label>
                        </div>

                        <!-- Campos do cartão (visíveis por padrão) -->
                        <div id="cartao-fields">
                            <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl mb-4" placeholder="Número do cartão">
                            <div class="grid grid-cols-2 gap-6 mb-4">
                                <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="Validade (MM/AA)">
                                <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="CVV">
                            </div>
                            <input type="text" class="input-dark w-full px-5 py-4 rounded-2xl" placeholder="Nome no cartão">
                        </div>

                        <!-- Mensagem para Pix (pode ser oculta/mostrada com JS se quiser) -->
                        <p class="text-sm text-gray-400 hidden" id="pix-message">
                            Ao selecionar Pix, você será redirecionado para a página de QR Code.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Resumo Final (exatamente como na sua imagem) -->
            <div class="md:col-span-2">
                <div class="bg-zinc-900 rounded-3xl p-8 sticky top-20">
                    <h2 class="text-2xl font-bold mb-6">Resumo do Pedido</h2>
                    <div class="space-y-4">
                        <div class="flex justify-between">
                            <span>Nike Pegasus 41 × 1</span>
                            <span>$139</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Adidas Ultraboost 23 × 1</span>
                            <span>$159</span>
                        </div>
                        <div class="border-t border-zinc-700 pt-4 flex justify-between font-semibold">
                            <span>Subtotal</span>
                            <span>$298</span>
                        </div>
                        <div class="flex justify-between text-green-400">
                            <span>Frete</span>
                            <span>Grátis</span>
                        </div>
                        <div class="border-t border-zinc-700 pt-4 flex justify-between text-xl font-black">
                            <span>Total</span>
                            <span>$298</span>
                        </div>
                    </div>

                    <!-- Botões de pagamento -->
                    <a href="pix.html" class="mt-6 block w-full bg-green-600 hover:bg-green-700 text-center py-5 rounded-3xl text-xl font-semibold transition">
                        Pagar com Pix (instantâneo)
                    </a>

                    <button onclick="alert('Pagamento por cartão processado! (demo)')" 
                            class="mt-4 w-full bg-orange-500 hover:bg-orange-600 py-5 rounded-3xl text-xl font-semibold transition">
                        Confirmar Pagamento (Cartão)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Opcional: mostrar/ocultar campos conforme método escolhido
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'pix') {  // se quiser usar value="pix" no input radio
                    document.getElementById('cartao-fields').classList.add('hidden');
                    document.getElementById('pix-message').classList.remove('hidden');
                } else {
                    document.getElementById('cartao-fields').classList.remove('hidden');
                    document.getElementById('pix-message').classList.add('hidden');
                }
            });
        });
    </script>

</body>
</html>
