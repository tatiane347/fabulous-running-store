<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Fabulous Running Sneakers</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; }
        
        .input-dark {
            background: #111;
            border: 1px solid #444;
            color: white;
        }
        .input-dark:focus {
            border-color: #ff6600;
            box-shadow: 0 0 0 3px rgba(255,102,0,0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-black">

    <!-- Navbar (cole o mesmo do index) -->

    <!-- Conteúdo principal -->
    <main class="flex-grow flex items-center justify-center py-16 px-6">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <h1 class="text-5xl md:text-6xl font-black text-orange-500 mb-4">Criar Conta</h1>
                <p class="text-xl text-gray-400">Junte-se à comunidade Fabulous</p>
            </div>

            <form id="cadastroForm" class="space-y-6 bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl">
                <div>
                    <label for="nome" class="block text-sm font-medium mb-2">Nome completo</label>
                    <input 
                        type="text" 
                        id="nome" 
                        required 
                        class="input-dark w-full px-5 py-4 rounded-2xl focus:outline-none" 
                        placeholder="Seu nome completo"
                    >
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium mb-2">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        required 
                        class="input-dark w-full px-5 py-4 rounded-2xl focus:outline-none" 
                        placeholder="seu@email.com"
                    >
                </div>

                <div>
                    <label for="senha" class="block text-sm font-medium mb-2">Senha</label>
                    <input 
                        type="password" 
                        id="senha" 
                        required 
                        minlength="6"
                        class="input-dark w-full px-5 py-4 rounded-2xl focus:outline-none" 
                        placeholder="Mínimo 6 caracteres"
                    >
                </div>

                <div class="text-sm text-gray-400">
                    Ao criar uma conta, você concorda com nossos 
                    <a href="termos-uso.html" class="text-orange-400 hover:underline">Termos de Uso</a> e 
                    <a href="politica-privacidade.html" class="text-orange-400 hover:underline">Política de Privacidade</a>.
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-orange-500 hover:bg-orange-600 py-5 rounded-3xl text-xl font-semibold transition duration-300"
                >
                    Criar Conta
                </button>

                <div class="text-center text-sm text-gray-400 mt-6">
                    Já tem conta? 
                    <a href="login.html" class="text-orange-400 hover:underline font-medium">Faça login</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->

    <!-- Script de cadastro -->
    <script>
        document.getElementById('cadastroForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            
            if (!nome || !email || !senha || senha.length < 6) {
                alert('Preencha todos os campos!\nA senha deve ter pelo menos 6 caracteres.');
                return;
            }
            
            // Salva no localStorage (simulação)
            localStorage.setItem('user', JSON.stringify({ nome, email, senha }));
            alert('Cadastro realizado com sucesso!\nAgora faça login para acessar sua conta.');
            window.location.href = 'login.html';
        });
    </script>

</body>
</html>
