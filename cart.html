<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabulous - Carrinho de Compras</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width='100' height='100' fill='%23ff6600' rx='20'/><text x='50' y='70' font-size='80' text-anchor='middle' fill='white' font-weight='bold'>F</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; }
        .cart-item { transition: all 0.3s ease; }
        .logo-box { background: linear-gradient(135deg, #ff6600, #ff8800); box-shadow: 0 0 25px rgba(255, 102, 0, 0.6); }
    </style>
</head>
<body class="min-h-screen bg-black">

    <!-- Navbar -->
    <nav class="bg-zinc-950 border-b border-zinc-800 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="logo-box px-5 py-2 rounded-lg flex items-center gap-2 cursor-pointer">
                    <span class="text-white text-3xl font-black tracking-tighter">F</span>
                    <span class="text-white text-3xl font-black tracking-tighter">abulous</span>
                </div>
            </a>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium uppercase tracking-widest">
                <a href="index.html" class="text-white hover:text-orange-400">HOME</a>
                <a href="shop.html" class="text-white hover:text-orange-400">SHOP</a>
                <a href="contact.html" class="text-white hover:text-orange-400">CONTACT</a>
            </div>
            <div class="flex items-center gap-6">
                <a href="cart.html" class="relative text-orange-400">
                    <i class="fas fa-shopping-cart text-2xl"></i>
                    <span id="cart-count-nav" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
        <h1 class="text-4xl font-black text-orange-500 mb-10 text-center">Seu Carrinho</h1>

        <div class="grid md:grid-cols-3 gap-10">
            <!-- Lista de Itens -->
            <div class="md:col-span-2 space-y-6" id="cart-items-container">
                <!-- Os itens adicionados aparecerão aqui -->
            </div>

            <!-- Resumo -->
            <div class="bg-zinc-900 rounded-3xl p-8 h-fit sticky top-20 border border-zinc-800">
                <h2 class="text-2xl font-bold mb-6">Resumo do Pedido</h2>
                <div class="space-y-4">
                    <div class="flex justify-between text-gray-300">
                        <span>Subtotal</span>
                        <span id="summary-subtotal">$0</span>
                    </div>
                    <div class="flex justify-between text-gray-300">
                        <span>Frete</span>
                        <span class="text-green-400">Grátis</span>
                    </div>
                    <div class="border-t border-zinc-800 pt-4 flex justify-between text-2xl font-black text-orange-500">
                        <span>Total</span>
                        <span id="summary-total">$0</span>
                    </div>
                </div>
                <button onclick="window.location.href='checkout.html'" class="w-full mt-8 bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg transition-transform active:scale-95">
                    Finalizar Compra
                </button>
                <a href="shop.html" class="block text-center text-gray-500 mt-4 hover:text-white transition-colors">
                    Continuar Comprando
                </a>
            </div>
        </div>
    </div>

    <footer class="bg-zinc-950 border-t border-zinc-800 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 text-center text-gray-500">
            © 2026 Fabulous - Tatiane Souza 🤑 - Todos os direitos reservados.
        </div>
    </footer>

    <script>
        // Função para carregar e exibir os produtos do localStorage
        function loadCart() {
            const container = document.getElementById('cart-items-container');
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-zinc-900 rounded-3xl">
                        <i class="fas fa-shopping-basket text-6xl text-zinc-700 mb-4"></i>
                        <p class="text-xl text-gray-400">Seu carrinho está vazio.</p>
                        <a href="shop.html" class="inline-block mt-6 text-orange-500 font-bold border-b-2 border-orange-500">Voltar para a loja</a>
                    </div>
                `;
                updateSummary(0, 0);
                return;
            }

            container.innerHTML = '';
            let total = 0;
            let count = 0;

            cart.forEach((item, index) => {
                total += (item.price * item.qty);
                count += item.qty;

                container.innerHTML += `
                    <div class="bg-zinc-900 rounded-3xl p-6 flex flex-col sm:flex-row gap-6 cart-item">
                        <img src="${item.img}" alt="${item.name}" class="w-full sm:w-40 h-40 object-cover rounded-2xl">
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-xl font-semibold">${item.name}</h3>
                                    <p class="text-orange-400 text-sm mt-1">Premium Edition</p>
                                </div>
                                <button onclick="removeItem(${index})" class="text-gray-500 hover:text-red-500 transition-colors">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            <div class="flex items-center justify-between mt-6">
                                <div class="flex items-center gap-3 bg-black rounded-full p-1 border border-zinc-800">
                                    <button onclick="updateQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-800 hover:bg-zinc-700">-</button>
                                    <span class="qty-value text-lg font-bold w-6 text-center">${item.qty}</span>
                                    <button onclick="updateQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-zinc-800 hover:bg-zinc-700">+</button>
                                </div>
                                <span class="text-2xl font-black text-white">$${item.price * item.qty}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            updateSummary(total, count);
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('cart'));
            cart[index].qty += change;
            if (cart[index].qty < 1) cart[index].qty = 1;
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart'));
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function updateSummary(total, count) {
            document.getElementById('summary-subtotal').innerText = `$${total}`;
            document.getElementById('summary-total').innerText = `$${total}`;
            document.getElementById('cart-count-nav').innerText = count;
        }

        window.onload = loadCart;
    </script>

</body>
</html>
