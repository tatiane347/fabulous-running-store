<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Fabulous Running Sneakers</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: white; 
        }
        .input-dark {
            background: #111;
            border: 1px solid #444;
            color: white;
        }
        .input-dark:focus {
            border-color: #ff6600;
            box-shadow: 0 0 0 3px rgba(255,102,0,0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-black">

    <!-- Navbar (cole aqui o mesmo <nav> do seu index.html para ficar idêntico) -->
    <!-- Exemplo: substitua pelo código real da sua navbar -->
    <nav class="bg-zinc-950 border-b border-zinc-800 py-3 sticky top-0 z-50">
        <!-- ... seu código de navbar completo aqui ... -->
    </nav>

    <!-- Conteúdo principal -->
    <main class="flex-grow flex items-center justify-center py-16 px-6">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <h1 class="text-5xl md:text-6xl font-black text-orange-500 mb-4">Entrar</h1>
                <p class="text-xl text-gray-400">Acesse sua conta Fabulous</p>
            </div>

            <form id="loginForm" class="space-y-6 bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl">
                <div>
                    <label for="email" class="block text-sm font-medium mb-2">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        required 
                        class="input-dark w-full px-5 py-4 rounded-2xl focus:outline-none" 
                        placeholder="seu@email.com"
                    >
                </div>

                <div>
                    <label for="senha" class="block text-sm font-medium mb-2">Senha</label>
                    <input 
                        type="password" 
                        id="senha" 
                        required 
                        class="input-dark w-full px-5 py-4 rounded-2xl focus:outline-none" 
                        placeholder="••••••••"
                    >
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center">
                        <input type="checkbox" class="mr-2 accent-orange-500">
                        Lembrar de mim
                    </label>
                    <a href="#" class="text-orange-400 hover:underline">Esqueceu a senha?</a>
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-orange-500 hover:bg-orange-600 py-5 rounded-3xl text-xl font-semibold transition duration-300"
                >
                    Entrar
                </button>

                <div class="text-center text-sm text-gray-400 mt-6">
                    Ainda não tem conta? 
                    <a href="cadastro.html" class="text-orange-400 hover:underline font-medium">Crie uma agora</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer (cole aqui o mesmo <footer> do seu index.html) -->
    <footer class="bg-zinc-950 border-t border-zinc-800 py-12 text-center text-gray-500">
        <!-- ... seu footer completo aqui ... -->
    </footer>

    <!-- Script de login (simulação com localStorage) -->
    <script>
        document.getElementById('loginForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            
            const user = JSON.parse(localStorage.getItem('user'));
            
            if (user && user.email === email && user.senha === senha) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('userName', user.nome || 'Corredor');
                alert('Login realizado! Bem-vindo(a), ' + (user.nome || 'Corredor') + '!');
                window.location.href = 'minha-conta.html';
            } else {
                alert('E-mail ou senha incorretos. Verifique e tente novamente.');
            }
        });
    </script>

</body>
</html>
